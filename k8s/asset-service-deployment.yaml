# Asset Service - Deployment
# Lab #6: Kubernetes deployment with 2 replicas and rolling updates
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-service
  labels:
    app: asset-service
    tier: backend
    service: microservice
spec:
  replicas: 2  # Lab #6 requirement: Deploy with 2 replicas
  selector:
    matchLabels:
      app: asset-service
  strategy:
    type: RollingUpdate  # Lab #6 requirement: Rolling updates
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: asset-service
        tier: backend
    spec:
      containers:
      - name: asset-service
        image: asset-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: asset-service-config
              key: database_url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: asset-service-config
              key: redis_url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
