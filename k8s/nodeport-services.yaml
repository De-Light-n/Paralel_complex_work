# NodePort Services for external access via minikube
# Lab #6: Exposing services for testing with kubectl port-forward or minikube tunnel
---
apiVersion: v1
kind: Service
metadata:
  name: asset-service-nodeport
  labels:
    app: asset-service
spec:
  type: NodePort
  selector:
    app: asset-service
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30001
    protocol: TCP
    name: http
